name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-verions: 20
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
      
      - name: Run test
        run: npm test
      
      - name: Build
        run: npm run build